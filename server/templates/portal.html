<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a la Red</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1e1e1e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #bb86fc; margin-bottom: 1rem; }
        p { margin-bottom: 1.5rem; line-height: 1.4; }
        button { background-color: #03dac6; color: #000; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #018786; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Catsplash</h1>
        <p>Para acceder a Internet, por favor acepta nuestros términos de uso.</p>
        <form action="/auth" method="POST">
            <input type="hidden" name="nonce" value="{{.Nonce}}">
            <button type="submit">Conectar</button>
        </form>
    </div>
</body>
</html>
