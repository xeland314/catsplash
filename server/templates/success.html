<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conexión Exitosa — Catsplash</title>
    <meta http-equiv="refresh" content="5;url={{.RedirectURL}}" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #2e1f14;
        --text: #f9e6c6;
        --sub: #f1a449;
        --footer: #8a6040;
        --border: #5c3a20;
        --card: rgba(61, 37, 16, 0.7);
        --window: #1e1208;
        --header: #4a2e18;
        --action: #4a2e18;
      }

      body {
        font-family: "Inconsolata", monospace;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 60% at 50% 40%,
          rgba(241, 164, 73, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 2px;
        width: 90%;
        max-width: 380px;
        overflow: hidden;
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(241, 164, 73, 0.05);
        animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .window-bar {
        background: var(--header);
        border-bottom: 1px solid var(--border);
        padding: 0.55rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(92, 58, 32, 0.5);
        border: 1px solid var(--border);
      }
      .dot.active {
        background: rgba(241, 164, 73, 0.5);
      }
      .window-title {
        font-size: 0.7rem;
        color: var(--footer);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-left: auto;
        margin-right: auto;
      }

      .body {
        padding: 2rem 1.8rem;
        background: var(--window);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Checkmark animated */
      .check-wrap {
        width: 56px;
        height: 56px;
        border: 2px solid var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.3rem;
        position: relative;
        animation: pulse-ring 2.5s ease-in-out infinite;
      }
      @keyframes pulse-ring {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(241, 164, 73, 0.2);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(241, 164, 73, 0);
        }
      }
      .check-wrap svg {
        width: 26px;
        height: 26px;
        stroke: var(--sub);
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .check-path {
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: draw-check 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      @keyframes draw-check {
        to {
          stroke-dashoffset: 0;
        }
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--sub);
        margin-bottom: 0.25rem;
        text-align: center;
      }
      .tagline {
        font-size: 0.7rem;
        color: var(--footer);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 1.6rem;
      }
      .divider {
        width: 100%;
        border: none;
        border-top: 1px solid var(--border);
        margin-bottom: 1.5rem;
      }

      p {
        font-size: 0.87rem;
        line-height: 1.65;
        color: var(--text);
        text-align: center;
        margin-bottom: 1.6rem;
        opacity: 0.85;
      }

      .btn {
        display: block;
        width: 100%;
        background: var(--action);
        border: 1px solid var(--border);
        color: var(--sub);
        font-family: "Inconsolata", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.75rem 1rem;
        border-radius: 2px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition:
          background 0.2s,
          color 0.2s,
          box-shadow 0.2s;
        position: relative;
        overflow: hidden;
      }
      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(241, 164, 73, 0.12) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.2s;
      }
      .btn:hover::before {
        opacity: 1;
      }
      .btn:hover {
        background: #5c3a20;
        color: var(--text);
        box-shadow:
          0 0 0 1px var(--sub) inset,
          0 4px 20px rgba(241, 164, 73, 0.1);
      }

      /* Countdown bar */
      .countdown-bar {
        width: 100%;
        height: 2px;
        background: var(--border);
        border-radius: 1px;
        margin-top: 1.3rem;
        overflow: hidden;
      }
      .countdown-fill {
        height: 100%;
        background: var(--sub);
        width: 100%;
        transform-origin: left;
        animation: drain 5s linear forwards;
      }
      @keyframes drain {
        to {
          transform: scaleX(0);
        }
      }

      .note {
        margin-top: 1.1rem;
        font-size: 0.68rem;
        color: var(--footer);
        letter-spacing: 0.05em;
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="window-bar">
        <div class="dot active"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <span class="window-title">conexión exitosa</span>
      </div>
      <div class="body">
        <div class="check-wrap">
          <svg viewBox="0 0 24 24">
            <polyline class="check-path" points="4,13 9,18 20,7" />
          </svg>
        </div>
        <h1>¡Conectado!</h1>
        <div class="tagline">acceso concedido</div>
        <hr class="divider" />
        <p>
          Ya tienes acceso a Internet. La red puede tardar unos segundos en
          estabilizarse.
        </p>
        <a href="{{.RedirectURL}}" class="btn">→ ir a internet ahora</a>
        <div class="countdown-bar"><div class="countdown-fill"></div></div>
        <div class="note">
          Redirigiendo en 5 segundos…<br />
          Si ves el símbolo <strong style="color: var(--sub)">!</strong>,
          recarga el WiFi de tu dispositivo.
        </div>
      </div>
    </div>
  </body>
</html>
