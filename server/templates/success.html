<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexión Exitosa</title>
    <meta http-equiv="refresh" content="5;url={{.RedirectURL}}">
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1e1e1e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #03dac6; margin-bottom: 1rem; }
        p { margin-bottom: 2rem; line-height: 1.4; }
        .btn { display: inline-block; background-color: #bb86fc; color: #000; text-decoration: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn:hover { background-color: #9965f4; }
        .note { font-size: 0.85rem; color: #999; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Conectado!</h1>
        <p>Ya tienes acceso a Internet. La red puede tardar unos segundos en estabilizarse.</p>
        
        <a href="{{.RedirectURL}}" class="btn">Ir a Internet ahora</a>

        <div class="note">
            Si sigues viendo el signo de admiración (!), intenta recargar el WiFi de tu dispositivo.
        </div>
    </div>
</body>
</html>
